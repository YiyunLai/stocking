name: 台股籌碼日報

on:
  schedule:
    # 每天 UTC 09:30 = 台灣時間 17:30（盤後資料通常 16:30–17:00 公布）
    - cron: "30 9 * * 1-5"
  workflow_dispatch:   # 允許手動觸發

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run scanner & send email
        env:
          GMAIL_USER:    ${{ secrets.GMAIL_USER }}
          GMAIL_TO:      ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PWD: ${{ secrets.GMAIL_APP_PWD }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
        run: python scanner/main.py
