name: stock report

on:
  schedule:
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: pip install requests pandas

      - name: run scanner
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scanner/main.py

      - name: build price volume pages
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
        run: python scanner/price_volume_pages.py

      - name: build streak filter pages
        run: python scanner/streak_filter_pages.py

      - name: commit pages
        run: |
          git config user.name bot
          git config user.email bot@example.com
          git add docs/
          git diff --staged --quiet || git commit -m "update stock pages"
          git push
